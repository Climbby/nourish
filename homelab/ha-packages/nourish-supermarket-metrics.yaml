# Supermarket zone + visit metrics (zone.auchan — adjust if your HA zone name differs)
# Deploy: homelab/deploy-ha-smart-shopping.sh or merge into packages/

rest_command:
  nourish_event_supermarket:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: application/json
    payload: '{"type":"supermarket_enter"}'
  nourish_event_leave_home:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: application/json
    payload: '{"type":"leave_home"}'
  nourish_at_supermarket:
    url: "http://192.168.1.24:5678/webhook/nourish-at-supermarket"
    method: POST
    content_type: application/json
    payload: "{}"
    timeout: 60

automation:
  - id: nourish_supermarket_arrival
    alias: "Nourish — chegada ao supermercado"
    description: Regista visita e envia lista de compras (ntfy + n8n)
    mode: single
    trigger:
      - platform: zone
        entity_id: person.francisco_fernandes
        zone: zone.auchan
        event: enter
    action:
      - action: rest_command.nourish_event_supermarket
      - action: rest_command.nourish_at_supermarket
