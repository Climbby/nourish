# Force high-accuracy GPS while away — fixes flaky/rare auto-trigger.
#
# Problem: supermarket discovery needs frequent, precise location, but the
# companion app's built-in high-accuracy auto-trigger (zone/BT based) fires
# rarely and inconsistently. Here HA becomes the single source of truth:
# force_on whenever you're plausibly away, force_off only when clearly home.
#
# Away = home Wi-Fi off (45 s debounce) OR person not_home OR foreign SSID.
# Home = on a home SSID OR francisco_em_wifi_de_casa on — Wi-Fi wins over a lagging
# person entity still reading 'home' after you left (fixes GPS not turning on).
# person 'home' only applies when Wi-Fi state is ambiguous (not connected yet).
#
# Requires:
#   - sensor.telemovel_francisco_wi_fi_connection (or sensor.francisco_wi_fi_connection)
#   - binary_sensor.francisco_em_wifi_de_casa  (nourish_wifi_presence.yaml)
#   - person.francisco_fernandes
#   - notify.mobile_app_telemovel_francisco
# Home SSIDs are duplicated from nourish_wifi_presence.yaml — keep both in sync.
# Prereqs on the phone (the real root cause of "rare"): Location = Allow all
# the time + Precise ON; HA battery usage = Unrestricted; location + Wi-Fi
# Connection sensors ON (the Wi-Fi SSID needs location permission to be read).

template:
  - binary_sensor:
      - name: "Francisco fora de casa"
        unique_id: francisco_fora_de_casa
        device_class: presence
        # 'on' = away. delay_off avoids flapping high-accuracy on/off at the door.
        # Wi-Fi disconnect marks away even if person still reads 'home' (GPS lag) —
        # leave-home already uses Wi-Fi; GPS high-accuracy must follow the same signal.
        state: >
          {% set ssid_a = states('sensor.telemovel_francisco_wi_fi_connection') %}
          {% set ssid_b = states('sensor.francisco_wi_fi_connection') %}
          {% set ssid = ssid_a if ssid_a not in ['unknown', 'unavailable', ''] else ssid_b %}
          {% set home_ssids = ['NOS-2774', 'NOS-2774-5', 'NOS-2774_EXT'] %}
          {% set on_home_wifi = ssid in home_ssids %}
          {% set on_other_wifi = ssid not in home_ssids
             and ssid not in ['<not connected>', 'unavailable', 'unknown', 'unauthorized', ''] %}
          {% set home_wifi_helper = is_state('binary_sensor.francisco_em_wifi_de_casa', 'on')
             or is_state('binary_sensor.francisco_em_wifi_de_casa_2', 'on') %}
          {% if on_home_wifi or home_wifi_helper %}
            false
          {% elif (not home_wifi_helper) and ssid not in ['unknown', 'unavailable', ''] %}
            true
          {% elif is_state('person.francisco_fernandes', 'home') %}
            false
          {% else %}
            {{ is_state('person.francisco_fernandes', 'not_home') or on_other_wifi }}
          {% endif %}
        delay_off:
          seconds: 45

automation:
  - id: nourish_high_accuracy_on
    alias: "Nourish — GPS alta precisão ON (fora de casa)"
    description: Força modo de alta precisão e intervalo de 30 s ao sair de casa
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.francisco_fora_de_casa
        to: "on"
        id: away
      - platform: state
        entity_id:
          - binary_sensor.francisco_em_wifi_de_casa
          - binary_sensor.francisco_em_wifi_de_casa_2
        to: "off"
        for:
          seconds: 45
        id: wifi_away
      # Re-assert periodically: the app can silently drop force mode on restart.
      - platform: time_pattern
        minutes: "/15"
        id: reassert
      - platform: homeassistant
        event: start
        id: hastart
    condition:
      # Never force_on just because em_wifi is off — that stays off when the
      # SSID sensor is missing/unavailable and would pin high-accuracy ON at home.
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.francisco_fora_de_casa
            state: "on"
          - condition: and
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity_id: binary_sensor.francisco_em_wifi_de_casa
                    state: "off"
                  - condition: not
                    conditions:
                      - condition: state
                        entity_id: binary_sensor.francisco_em_wifi_de_casa_2
                        state: "on"
              - condition: not
                conditions:
                  - condition: state
                    entity_id: person.francisco_fernandes
                    state: "home"
    action:
      - action: notify.mobile_app_telemovel_francisco
        data:
          message: command_high_accuracy_mode
          data:
            command: force_on
      - action: notify.mobile_app_telemovel_francisco
        data:
          message: command_high_accuracy_mode
          data:
            command: high_accuracy_set_update_interval
            high_accuracy_update_interval: 30   # seconds (min 5)
      # Lightweight trace on every assert — visible in HA Logbook, no phone spam.
      - action: logbook.log
        data:
          name: Nourish GPS
          entity_id: binary_sensor.francisco_fora_de_casa
          message: "force_on enviado (trigger: {{ trigger.id }})"
      # Visible phone notification only on the actual away transition — confirms
      # the push/command channel is alive (same pathway command_* rides on).
      - if:
          - condition: template
            value_template: "{{ trigger.id in ['away', 'wifi_away'] }}"
        then:
          - action: notify.mobile_app_telemovel_francisco
            data:
              title: "GPS alta precisão ON"
              message: "Modo de alta precisão forçado (saíste de casa)."
              data:
                importance: low
                tag: nourish_high_accuracy

  - id: nourish_high_accuracy_off
    alias: "Nourish — GPS alta precisão OFF (em casa)"
    description: Desliga o modo de alta precisão ao chegar a casa (poupa bateria)
    mode: single
    trigger:
      - platform: state
        entity_id: binary_sensor.francisco_fora_de_casa
        to: "off"
        id: away_off
      # Immediate off when home Wi-Fi reconnects — do not wait for francisco_fora_de_casa
      # delay_off (45 s) or a lagging person.not_home → not_home flip.
      - platform: state
        entity_id:
          - binary_sensor.francisco_em_wifi_de_casa
          - binary_sensor.francisco_em_wifi_de_casa_2
        to: "on"
        id: wifi_home
      - platform: state
        entity_id: person.francisco_fernandes
        to: "home"
        id: person_home
      # Re-assert periodically: a single force_off can be silently dropped by the
      # app (it then stays high-accuracy at home, draining battery). Mirrors the
      # force_on re-assert so a dropped command self-heals within 15 min.
      - platform: time_pattern
        minutes: "/15"
        id: reassert
      - platform: homeassistant
        event: start
        id: hastart
    condition:
      - condition: or
        conditions:
          - condition: state
            entity_id: binary_sensor.francisco_fora_de_casa
            state: "off"
          - condition: state
            entity_id: binary_sensor.francisco_em_wifi_de_casa
            state: "on"
          - condition: state
            entity_id: binary_sensor.francisco_em_wifi_de_casa_2
            state: "on"
          - condition: state
            entity_id: person.francisco_fernandes
            state: "home"
    action:
      - action: notify.mobile_app_telemovel_francisco
        data:
          message: command_high_accuracy_mode
          data:
            command: force_off
      - action: logbook.log
        data:
          name: Nourish GPS
          entity_id: binary_sensor.francisco_fora_de_casa
          message: "force_off enviado (trigger: {{ trigger.id }})"
