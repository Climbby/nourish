# rest_command + supermarket zone automations
# nourish_despensa_check + input_number live in configuration.yaml

rest_command:
  nourish_at_supermarket:
    url: "http://192.168.1.24:5678/webhook/nourish-at-supermarket"
    method: POST
    content_type: "application/json"
    payload: "{}"
    timeout: 60
  nourish_event_supermarket_enter:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: "application/json"
    payload: '{"type":"supermarket_enter","zone":"zone.auchan"}'
    timeout: 15
  nourish_event_supermarket_leave:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: "application/json"
    payload: '{"type":"supermarket_leave"}'
    timeout: 15
  nourish_event_supermarket_zone:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: "application/json"
    payload: "{{ body }}"
    timeout: 15
  nourish_event_leave_home:
    url: "http://192.168.1.27:8787/event"
    method: POST
    content_type: "application/json"
    payload: '{"type":"leave_home"}'
    timeout: 15

automation:
  - id: nourish_supermarket_arrival
    alias: "Nourish — chegada ao supermercado"
    description: Regista visita e envia lista de compras ao telemovel
    mode: single
    max_exceeded: silent
    trigger:
      - platform: zone
        entity_id: person.francisco_fernandes
        zone: zone.auchan
        event: enter
    action:
      - action: rest_command.nourish_event_supermarket_enter
      - action: rest_command.nourish_at_supermarket

  - id: nourish_supermarket_departure
    alias: "Nourish — saída do supermercado"
    description: Fecha visita no historial (hora de saída e duração)
    mode: single
    max_exceeded: silent
    trigger:
      - platform: zone
        entity_id: person.francisco_fernandes
        zone: zone.auchan
        event: leave
    action:
      - action: rest_command.nourish_event_supermarket_leave
