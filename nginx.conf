server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # CT has no IPv6 — resolver ipv6=off + variable upstream; rewrite keeps /ai/* → /api/*
    location /ai/ {
        resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
        resolver_timeout 5s;
        set $openrouter_upstream openrouter.ai;
        rewrite ^/ai/(.*)$ /api/$1 break;
        proxy_pass https://$openrouter_upstream;
        proxy_ssl_server_name on;
        proxy_ssl_name openrouter.ai;
        proxy_set_header Authorization "Bearer ${OPENROUTER_API_KEY}";
        proxy_set_header Host openrouter.ai;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 256k;
        proxy_connect_timeout 15s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /nourish/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_connect_timeout 5s;
        proxy_read_timeout 120s;
    }

    location /api/ {
        proxy_pass http://${GROCY_HOST}/api/;
        proxy_set_header GROCY-API-KEY "${GROCY_API_KEY}";
        proxy_set_header Host "${GROCY_HOST}";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
